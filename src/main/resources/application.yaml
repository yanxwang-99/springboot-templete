spring:
  application:
    name: demo

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: vben-admin-secret-key-must-be-at-least-256-bits-long-for-security
  access-token-expiration: 604800000   # 7天 (毫秒)
  refresh-token-expiration: 2592000000 # 30天 (毫秒)

server:
  port: 8080
